name: Garmin Daily Sync

on:
  schedule:
    # Hourly 5:30am-9:30pm EDT (UTC-4). 5:30am EDT = 09:30 UTC.
    # Runs at minute 30 of each hour from 09:30 UTC through 01:30 UTC next day.
    - cron: '30 9-23 * * *'   # 5:30am - 7:30pm EDT
    - cron: '30 0-1 * * *'    # 8:30pm - 9:30pm EDT (00:30, 01:30 UTC)
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install garminconnect firebase-admin requests

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python garmin_sync.py
